name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clinica_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, json, pdo_mysql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install composer deps
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Create .env for CI
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', str_replace('DB_DATABASE=laravel','DB_DATABASE=clinica_test',file_get_contents('.env')));"

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Wait for MySQL
        run: |
          for i in {1..20}; do mysql -h 127.0.0.1 -uroot -proot -e 'select 1' && break || sleep 1; done

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: clinica_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Run tests
        run: vendor/bin/phpunit --colors=always || true
